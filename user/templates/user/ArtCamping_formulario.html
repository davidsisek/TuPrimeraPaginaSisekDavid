{% extends "user/base.html" %}

{% block title %}Agregar Toldos - AppBaquedano{% endblock %}

{% block content %}
<div class="container">
  <div class="form-page">
    <div class="form-page__header">
      <a href="{% url 'ArtCamping' %}" class="form-page__back">← Volver a ArtCamping</a>
      <h1>Agregar ArtCamping</h1>
      <p class="text-muted">Completa el formulario para registrar un nuevo ArtCamping.</p>
    </div>
    <div class="card">
      <form action="{% url 'ArtCampingFormulario' %}" method="post" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Enviar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
